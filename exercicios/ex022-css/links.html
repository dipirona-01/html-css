<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif;
        }
        a {  
            color: rgb(255, 0, 0);
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {  
            color: darkred;
        }
        a:hover { 
            text-decoration: underline;
            color: black;
        }
        a:active { 
            color: yellow;
        }
        a::after {
            content: '<-';
            color: gray;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com"
            target="_blank">Repositorio github</a></li>
        <li><a href="https://youtube.com">Canal do Youtube</a></li>
        <li><a href="https://cursoemvideo.com">Site do curso em video</a></li>
    </ul>
</body>
</html>
