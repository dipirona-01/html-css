<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        header{
            background-color: gray;
            color: white;
            padding: 10px;

            display: flex;
            flex-flow: row wrap;
            justify-content: space-between;
        }
        header > h1{
            border: 1px dotted black;
            flex: 0 0 200px;
        }
        .conteiner{
            background-color: gray;
        }
        .cx1{
            background-color: black;
            color: white;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            text-align: center;
        }
        .cx1:hover {
            background-color: lightgray;
        }
        #o1{
           flex: 1 0;
        }
        #o2{
           flex: 1 0;
        }
        #o3{
           flex: 1 0;
        }
        #o4{
           flex: 1 0;
        }
        #o5{
            flex: 1 0;
        }
        #o6{
            flex: 1 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu Site</h1>
            <div class="conteiner">
                <div class="cx1" id="o1">Opção1</div>
                <div class="cx1" id="o2">Opção2</div>
                <div class="cx1" id="o3">Opção3</div>
                <div class="cx1" id="o4">Opção4</div>
                <div class="cx1" id="o5">Opção5</div>
                <div class="cx1" id="o6">Opção6</div>
            </div>
    </header>
</body>
</html>
