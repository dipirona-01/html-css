<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 450px;
        }
        td, th {
            border: 1px solid black;
            padding: 5px;
        }
        thead, tfoot {
            background-color: gray;
        }
        tbody > tr:nth-child(2n){
            background-color: lightgray;
        }
        .num {
            text-align: right;
        }
        caption {
            font-size: 1.5em;
            font-weight: bold;
            padding: 5px;
            background-color: lightgray;
            width: 450px;
        }
    </style>
</head>
<body>
    <h1>Uso de tabelas grandes</h1>
    <table>
        <caption>População dos Estados Brasileiros</caption>
        <thead>
            <tr>
                <th scope="col">Estado</th>
                <th scope="col" style="width: 50px;">População</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="num">12.450.000</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">12.450.000</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">12.450.000</td>
            </tr>
            <tr>
                <td>Bahia</td>
                <td class="num">9.000.0000</td>
            </tr>
            <tr>
                <td>Sergipe</td>
                <td class="num">2.300.000</td>
             </tr>
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total</th>
                <td>23.450.000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
