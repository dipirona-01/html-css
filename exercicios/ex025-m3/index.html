<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 350px;
            border-collapse: collapse;
        }
        .linha {
            background-color: gray;
        }
        td {
            border: 1px solid black;
            padding: 6px;
        }
        .cor {
            background-color: olive;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <table>
        <tr class="linha">
            <td>a1</td>
            <td>b1</td>
            <td class="cor">c1</td>
        </tr> 
        <tr>
            <td>a2</td>
            <td class="cor">b2</td>
            <td>c2</td>
        </tr>
        <tr class="linha">
            <td>a3</td>
            <td>b3</td>
            <td>c3</td>
        </tr>
        <tr>
            <td>a4</td>
            <td class="cor">b4</td>
            <td>c4</td>
        </tr>
    </table>
</body>
</html>
