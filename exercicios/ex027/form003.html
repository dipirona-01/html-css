<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="get">
        <p>
            <label for="inome">Nome:</label>
            <input type="text" id="inome" name="nome" required maxlength="30" placeholder="Nome" autocomplete="name">
        </p>
        <p>
            <label for="imedia">Média:</label>
            <input type="number" id="imedia" name="media" required min="0" max="10" step="0.1">
        </p>
        <p>
            <label for="imeses">Meses:</label>
            <input type="month" name="meses" id="imeses" required min="1999" max="2026">
        </p>
        <p>
            <label for="idia">Dia:</label>
            <input type="date" id="idia" name="dia" required>
        </p>
        <p>
            <input type="reset" value="Limpar">
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
